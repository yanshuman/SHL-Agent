services:
  - type: web
    name: shl-assessment-recommender
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -c "from src.retriever import CatalogRetriever; CatalogRetriever('data/catalog.json', 'data/catalog.index')"
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: openrouter
      - key: LLM_MODEL
        value: meta-llama/llama-3.1-8b-instruct:free
      - key: LLM_API_KEY
        sync: false
